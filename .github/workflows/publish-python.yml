name: publish-python

# Publishes wayid-verify to PyPI on a `py-v*` tag (e.g. py-v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no token needed once the publisher is
# configured on PyPI (project: wayid-verify, workflow: publish-python.yml,
# environment: pypi). See PUBLISHING.md.
on:
  push:
    tags:
      - "py-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
